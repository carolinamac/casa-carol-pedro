<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="/casa-carol-pedro/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Casa">
<link rel="apple-touch-icon" href="/casa-carol-pedro/icon-192.png">
<meta name="theme-color" content="#2D4A3E">
<title>Casa Carol & Pedro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2EFE9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:80px;font-size:18px}
.hero{background:#2D4A3E;padding:1.5rem 1.5rem 1rem;color:#fff}
.hero-eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#6AA88E;font-weight:500;margin-bottom:8px}
.hero-name{font-size:34px;font-weight:400;color:#F0EDE8;letter-spacing:-0.5px;line-height:1.1}
.hero-date{font-size:15px;color:#7AAE94;margin-top:6px}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.hp{display:inline-flex;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;background:rgba(255,255,255,0.09);color:#7AAE94}
.hp.ok{background:rgba(139,184,164,0.22);color:#A8D4BC}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start}
.cfg-btn{padding:6px 12px;border-radius:7px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#A8D4BC;cursor:pointer;font-size:13px;font-family:inherit}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#2D4A3E;display:flex;border-top:0.5px solid rgba(255,255,255,0.1);z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 14px;cursor:pointer;gap:4px;opacity:0.55;transition:opacity .15s}
.tab.active{opacity:1}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-size:11px;color:#A8D4BC;font-weight:500;letter-spacing:0.5px}
.body{padding:1rem 1.25rem 1rem}
.sec{margin-bottom:1rem;background:#fff;border-radius:14px;border:0.5px solid #E8E3DA;overflow:hidden}
.sec-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:0.5px solid #F2EFE9}
.sec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-lbl{flex:1;font-size:17px;font-weight:500;color:#1E1E1E}
.badge{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;background:#F2EFE9;color:#9A958E}
.badge.ok{background:#E4F2EA;color:#2E7A4F}
.task{display:flex;align-items:center;gap:14px;padding:15px 16px;border-bottom:0.5px solid #F8F5F1;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.task:last-child{border-bottom:none}
.task:active{background:#FAFAF8}
.chk{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1.5px solid #D8D2C8;background:#fff;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:all .15s}
.chk.done{background:#2D4A3E;border-color:#2D4A3E}
.tlbl{flex:1;font-size:17px;color:#1E1E1E;line-height:1.4;pointer-events:none}
.tlbl.done{color:#B8B3AA;text-decoration:line-through}
.how{padding:5px 11px;border-radius:6px;border:0.5px solid #E0DAD2;background:#F8F5F1;font-size:13px;color:#8A8580;cursor:pointer;font-family:inherit;flex-shrink:0;font-weight:500}
.task-destaque{display:flex;align-items:center;gap:14px;padding:15px 16px;border-bottom:0.5px solid #F8F5F1;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;background:#FFFBEB;border-left:3px solid #C4973A}
.task-destaque:last-child{border-bottom:none}
.task-destaque:active{background:#FFF3D0}
.task-destaque .tlbl{color:#92700A}
.task-destaque .tlbl.done{color:#C8B88A;text-decoration:line-through}
.task-destaque .chk.done{background:#C4973A;border-color:#C4973A}
.warn{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:#FFFBEB;border-bottom:0.5px solid #F5E8B0}
.warn:last-child{border-bottom:none}
.warn-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.warn-txt{font-size:15px;color:#92700A;line-height:1.5}
.all-done{margin:0 0 1rem;padding:16px;border-radius:14px;background:#E4F2EA;text-align:center;font-size:17px;font-weight:500;color:#2E7A4F;border:0.5px solid #C8E4D4}
.fax-note{padding:9px 16px;font-size:14px;color:#A8A49E;background:#FDFCFB;border-bottom:0.5px solid #F2EFE9}
.ciclo-wrap{padding:8px 16px 14px}
.ciclo-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;margin-bottom:3px}
.ciclo-item.now{background:#EEF7F3}
.irow{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:0.5px solid #F8F5F1;cursor:pointer}
.irow:last-child{border-bottom:none}
.footer{padding:20px 1.5rem;background:#2D4A3E;text-align:center}
.footer-txt{font-size:15px;color:#8BBB9E;line-height:1.7}
.wd-screen{padding:3rem 1.5rem;text-align:center}
.wd-title{font-size:12px;letter-spacing:3px;color:#9A958E;text-transform:uppercase;margin-bottom:10px}
.wd-msg{font-size:22px;color:#2D2D2D;font-weight:400;margin-bottom:6px}
.wd-sub{font-size:16px;color:#A8A49E}
.day-card{margin-bottom:1rem;background:#fff;border-radius:14px;border:0.5px solid #E8E3DA;overflow:hidden}
.day-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #F2EFE9}
.day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-name{flex:1;font-size:16px;font-weight:500;color:#1E1E1E}
.day-today{font-size:12px;font-weight:600;color:#2D4A3E;background:#EEF7F3;padding:3px 9px;border-radius:10px}
.day-task-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #F8F5F1;font-size:16px;color:#4A4845}
.day-task-row:last-child{border-bottom:none}
.day-dot-sm{width:6px;height:6px;border-radius:50%;background:#D8D2C8;flex-shrink:0}
.day-warn{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;background:#FFFBEB;border-bottom:0.5px solid #F5E8B0;font-size:15px;color:#92700A}
.cardapio-card{margin-bottom:1rem;background:#fff;border-radius:14px;border:0.5px solid #E8E3DA;overflow:hidden}
.cardapio-header{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(135deg,#2D4A3E,#3D6A58);border-bottom:0.5px solid rgba(255,255,255,0.15)}
.cardapio-title{flex:1;font-size:17px;font-weight:500;color:#fff}
.cardapio-sub{font-size:13px;color:#A8D4BC}
.cardapio-body{padding:14px 16px}
.cardapio-item{margin-bottom:10px}
.cardapio-item:last-child{margin-bottom:0}
.cardapio-label{font-size:11px;font-weight:600;color:#A8A49E;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.cardapio-value{font-size:16px;color:#1E1E1E;line-height:1.35}
.cardapio-link{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:5px 12px;border-radius:8px;background:#EEF7F3;color:#2D4A3E;font-size:13px;font-weight:500;text-decoration:none;border:0.5px solid #C8E4D4}
.cardapio-link:active{background:#D4EDE2}
.cardapio-vazio{padding:14px 16px;font-size:15px;color:#A8A49E;text-align:center}
.setup-wrap{background:#2D4A3E;min-height:100vh;padding:1.5rem}
.setup-top{text-align:center;margin-bottom:1.5rem}
.setup-eyebrow{font-size:12px;letter-spacing:3px;color:#6AA88E;text-transform:uppercase;margin-bottom:6px}
.setup-title{font-size:24px;color:#F0EDE8;font-weight:500}
.setup-card{background:#fff;border-radius:16px;padding:1.5rem;max-width:460px;margin:0 auto}
.setup-card h2{font-size:18px;font-weight:500;color:#1E1E1E;margin-bottom:4px}
.setup-card p{font-size:15px;color:#8A8580;margin-bottom:1.25rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.wk{padding:12px 6px;border-radius:10px;cursor:pointer;text-align:center;border:1.5px solid #E8E3DA;background:#FAFAF8;font-family:inherit;width:100%}
.wk.sel{border-color:#2D4A3E;background:#EEF7F3}
.wk-n{font-size:14px;font-weight:600;color:#1E1E1E}
.wk-s{font-size:9px;color:#A8A49E;margin-top:2px;line-height:1.3}
.wk.sel .wk-n{color:#2D4A3E}
.confirm-btn{width:100%;padding:15px;border-radius:10px;border:none;background:#2D4A3E;color:#fff;font-size:17px;font-weight:500;cursor:pointer;font-family:inherit}
.instr-wrap{background:#F2EFE9;min-height:100vh;padding-bottom:80px}
.instr-hero{background:#2D4A3E;padding:1.25rem 1.5rem 1.5rem}
.instr-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#A8D4BC;cursor:pointer;font-size:15px;font-family:inherit;margin-bottom:12px}
.instr-title{font-size:22px;font-weight:500;color:#F0EDE8}
.steps-card{background:#fff;border-radius:14px;margin:1rem 1.25rem;border:0.5px solid #E8E3DA;overflow:hidden}
.step{display:flex;gap:14px;padding:15px 16px;border-bottom:0.5px solid #F2EFE9}
.step:last-child{border-bottom:none}
.snum{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:#EEF7F3;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#2D4A3E}
</style>
</head>
<body>
<div id="app"></div>
<script>
var ROTINA=[{id:"r1",tx:"Abrir janelas da sala para ventilar as plantas"},{id:"r2",tx:"Lavar a louça"},{id:"r3",tx:"Preparar fruta do Pedro"},{id:"r4",tx:"Tirar sapatos do hall, limpar e guardar"},{id:"r5",tx:"Retirar o lixo (se cheio ou com cheiro)"},{id:"r6",tx:"Arrumar a cama"},{id:"r7",tx:"Preparar o jantar e colocar a mesa"},{id:"r8",tx:"Varrer e passar o mop no chão"},{id:"r9",tx:"Verificar se tem entrega na portaria"},{id:"r10",tx:"Fechar as janelas no final do dia"}];
function deveAparecerAC(){var ref=load('ac_ref_date');var today=new Date();if(!ref){save('ac_ref_date',today.toISOString().slice(0,10));return true;}var diffDays=Math.floor((today-new Date(ref))/(24*3600*1000));return diffDays>=14;}
function marcouAC(){return !!load('ac_done_'+new Date().toISOString().slice(0,10));}
function toggleAC(){var key='ac_done_'+new Date().toISOString().slice(0,10);var done=!!load(key);save(key,!done);if(!done){save('ac_ref_date',new Date().toISOString().slice(0,10));}}
var DIA={1:{warns:["⚠️ Pedro tem aula de piano das 8h30 às 10h30 — não usar a cozinha nem a sala de estar nesse período! Faça as atividades dos quartos pela manhã.","🍽️ Hoje almoçamos em casa — programar almoço para as 12h."],tasks:[{id:"m1",tx:"Lavar roupas de academia",instr:"academia"},{id:"m2",tx:"Limpar área do café e bancada da cozinha"},{id:"m3",tx:"Fazer comida"}]},2:{warns:[],tasks:[{id:"t1",tx:"Regar as plantas"},{id:"t2",tx:"Lavar roupas normais",instr:"roupas"},{id:"t3",tx:"Fazer comida"},{id:"t4",tx:"Baleia na creche"}]},3:{warns:[],tasks:[{id:"w1",tx:"Lavar o lençol",instr:"lencol"},{id:"w2",tx:"Trocar o lençol (Pedro e Carol)"},{id:"w3",tx:"Guardar as compras de supermercado"},{id:"w4",tx:"Lavar e secar as folhas!"},{id:"w5",tx:"Fazer comida"},{id:"w6",tx:"Baleia na creche"}]},4:{warns:[],tasks:[{id:"h1",tx:"Lavar roupas de academia",instr:"academia"},{id:"h2",tx:"Passar as roupas"},{id:"h3",tx:"Limpar área da Baleia"},{id:"h4",tx:"Fazer comida"},{id:"h5",tx:"Baleia na creche"}]},5:{warns:["🍽️ Hoje almoçamos em casa — programar almoço para as 13h."],tasks:[{id:"f0",tx:"🤖 Verificar se o robô aspirador está limpo e fazer limpeza!",destaque:true},{id:"f1",tx:"Regar as plantas"},{id:"f2",tx:"Lavar os banheiros"},{id:"f3",tx:"Trocar e lavar toalhas e tapetes",instr:"toalhas"},{id:"f4",tx:"Limpar área do café e bancada da cozinha"},{id:"f5",tx:"Fazer comida"}]}};
var FAXINA=[{titulo:"Área da cozinha",itens:["Limpeza da geladeira (por dentro e por fora)","Armários e gavetas da cozinha"]},{titulo:"Eletrodomésticos",itens:["Microondas e forno","Adega e cervejeira"]},{titulo:"Área de serviço",itens:["Armários da área de serviço","Máquina de lavar (limpeza interna)"]},{titulo:"Sala de estar",itens:["Tirar poeira dos livros e prateleiras","Passar aspirador no sofá"]},{titulo:"Banheiros e corredor",itens:["Armários internos dos banheiros","Armário do corredor"]},{titulo:"Quarto 1 — armários",itens:["Limpar e organizar os armários do quarto 1"]},{titulo:"Quarto 2 — armários",itens:["Limpar e organizar os armários do quarto 2"]},{titulo:"Quarto 3 — armário",itens:["Limpar e organizar o armário do quarto 3"]},{titulo:"Escritório",itens:["Prateleiras de livros do escritório","Limpar o carrinho"]},{titulo:"Portas",itens:["Limpar todas as portas da casa (molduras, maçanetas e superfície)"]},{titulo:"Persianas",itens:["Limpar as persianas de todos os cômodos"]}];
var INSTR={academia:{titulo:"Roupas de academia",passos:["Lavar separado das roupas do dia a dia.","Usar o modo TECIDO SINTÉTICO na máquina.","Pinho Sol no lugar do sabão + 1 tampa de Lysoform.","Nunca usar amaciante — vinagre branco no lugar.","Cada cor num saquinho. Meias e cuecas separadas.","Nunca passar — espirrar o cheirinho e guardar."]},roupas:{titulo:"Roupas normais",passos:["Separar por cores: brancas, pretas e coloridas.","Poucas peças: pode juntar pretas e coloridas em saquinhos diferentes.","Usar o modo MIX na máquina.","Verificar manchas e aplicar detergente direto antes de lavar.","Roupas brancas: Vanish de vez em quando (molho).","Vestidos e peças delicadas — Carol lava na mão.","Sempre espirrar cheirinho ao passar ou guardar."]},lencol:{titulo:"Lençol",passos:["Lavar o lençol separado de outras roupas.","Usar o modo ALGODÃO na máquina.","Sabão normal — bicarbonato se tiver cheiro forte.","Sem amaciante — meio copo de vinagre branco no lugar.","Secar bem na máquina com a função de secagem."]},toalhas:{titulo:"Toalhas e tapetes de banheiro",passos:["Lavar separado das roupas.","Pode misturar cores, mas usar saquinho nas coloridas.","Usar o modo ALGODÃO na máquina.","Sabão normal — 1 colher de bicarbonato se tiver cheiro.","Sem amaciante — meio copo de vinagre branco no lugar.","Secar bem na máquina com a função de secagem.","Espirrar cheirinho e guardar no armário do corredor."]}};
var DIAS_FULL=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
var MESES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
var today=new Date(),dow=today.getDay(),isWeekend=(dow===0||dow===6),dateKey=today.toISOString().slice(0,10);
function getMon(d){var t=new Date(d),dy=t.getDay();t.setDate(t.getDate()-dy+(dy===0?-6:1));return t.toISOString().slice(0,10);}
var mondayKey=getMon(today),dayData=(!isWeekend&&DIA[dow])||{warns:[],tasks:[]};
var S={view:'main',tab:'hoje',ck:{},fx:{},refDate:null,weekNum:null,setupWk:1,instrKey:null,cardapio:null};
function calcWeek(){if(!S.refDate){S.weekNum=null;return;}var diff=Math.floor((new Date(mondayKey)-new Date(S.refDate))/(7*24*3600*1000));S.weekNum=((diff%11)+11)%11+1;}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function chkSVG(){return '<svg width="14" height="14" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6.5 4.5,9.5 10.5,2.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function bind(id,fn,stop){var el=document.getElementById(id);if(!el)return;el.addEventListener('click',function(e){if(stop)e.stopPropagation();fn(e);});}
function notionUrl(id){return 'https://www.notion.so/'+id.replace(/-/g,'');}
function loadCardapio(){var url='https://raw.githubusercontent.com/carolinamac/casa-carol-pedro/main/cardapio.json?t='+Date.now();fetch(url).then(function(r){return r.json();}).then(function(d){S.cardapio=d;if(S.view==='main')draw();}).catch(function(){S.cardapio={};});}
function todayCardapio(){if(!S.cardapio||!S.cardapio.dias)return null;return S.cardapio.dias[String(dow)]||null;}
function cardapioHTML(){var cd=todayCardapio();var header='<div class="cardapio-header"><div class="sec-icon" style="background:rgba(255,255,255,0.15);font-size:18px;line-height:1">🍽️</div><div><div class="cardapio-title">Jantar de hoje</div>'+(S.cardapio&&S.cardapio.semana_inicio?'<div class="cardapio-sub">Semana de '+S.cardapio.semana_inicio+'</div>':'')+'</div></div>';if(!cd||!cd.proteina){return '<div class="cardapio-card">'+header+'<div class="cardapio-vazio">Cardápio ainda não planejado para esta semana.</div></div>';}var prot='<div class="cardapio-item"><div class="cardapio-label">Prato principal</div><div class="cardapio-value">'+cd.proteina.n+'</div>'+(cd.proteina.id?'<a href="'+notionUrl(cd.proteina.id)+'" target="_blank" class="cardapio-link">📖 Ver receita no Notion</a>':'')+'</div>';var acomp=cd.acompanhamento?'<div class="cardapio-item"><div class="cardapio-label">Acompanhamento</div><div class="cardapio-value">'+cd.acompanhamento.n+'</div>'+(cd.acompanhamento.id?'<a href="'+notionUrl(cd.acompanhamento.id)+'" target="_blank" class="cardapio-link">📖 Ver receita</a>':'')+'</div>':'';var salada=cd.salada?'<div class="cardapio-item"><div class="cardapio-label">Salada</div><div class="cardapio-value">'+cd.salada.n+'</div>'+(cd.salada.id?'<a href="'+notionUrl(cd.salada.id)+'" target="_blank" class="cardapio-link">📖 Ver receita</a>':'')+'</div>':'';return '<div class="cardapio-card">'+header+'<div class="cardapio-body">'+prot+acomp+salada+'</div></div>';}
function draw(){var app=document.getElementById('app');if(!app)return;if(S.view==='setup'){drawSetup(app);return;}if(S.view==='instr'){drawInstr(app);return;}drawShell(app);}
function heroHTML(){var rOk=ROTINA.filter(function(t){return S.ck[t.id];}).length,tOk=dayData.tasks.filter(function(t){return S.ck[t.id];}).length,fd=S.weekNum?FAXINA[S.weekNum-1]:null,fTotal=fd?fd.itens.length:0,fOk=fd?fd.itens.filter(function(_,i){return S.fx['i'+i];}).length:0,greeting=isWeekend?'Bom fim de semana!':'Bom dia!';var pills='';if(!isWeekend){pills+='<span class="hp'+(rOk===ROTINA.length?' ok':'')+'">Rotina '+rOk+'/'+ROTINA.length+'</span>';if(dayData.tasks.length)pills+='<span class="hp'+(tOk===dayData.tasks.length?' ok':'')+'">Tarefas '+tOk+'/'+dayData.tasks.length+'</span>';}if(S.weekNum)pills+='<span class="hp'+(fOk===fTotal&&fTotal>0?' ok':'')+'">Faxina sem. '+S.weekNum+'/11</span>';return '<div class="hero"><div class="hero-top"><div><div class="hero-eyebrow">Casa Carol & Pedro</div><div class="hero-name">'+greeting+'</div><div class="hero-date">'+DIAS_FULL[dow]+', '+today.getDate()+' de '+MESES[today.getMonth()]+'</div></div><button id="btnCfg" class="cfg-btn">⚙ Config</button></div>'+(pills?'<div class="hero-pills">'+pills+'</div>':'')+'</div>';}
function tabbarHTML(){var tabs=[{id:'hoje',icon:'☀️',label:'HOJE'},{id:'semana',icon:'📅',label:'SEMANA'},{id:'faxina',icon:'🏠',label:'FAXINA'},{id:'instrucoes',icon:'💡',label:'COMO FAZER'}];return '<div class="tabbar">'+tabs.map(function(t){return '<div class="tab'+(S.tab===t.id?' active':'')+'" id="tab_'+t.id+'"><div class="tab-icon">'+t.icon+'</div><div class="tab-label">'+t.label+'</div></div>';}).join('')+'</div>';}
function drawShell(app){var content='';if(S.tab==='hoje')content=todayContent();else if(S.tab==='semana')content=semanaContent();else if(S.tab==='faxina')content=faxinaContent();else if(S.tab==='instrucoes')content=instrContent();app.innerHTML=heroHTML()+'<div class="body">'+content+'</div>'+footerHTML()+tabbarHTML();bind('btnCfg',function(){S.view='setup';draw();});['hoje','semana','faxina','instrucoes'].forEach(function(id){bind('tab_'+id,function(){S.tab=id;draw();});});if(S.tab==='hoje')bindToday();else if(S.tab==='faxina')bindFaxina();else if(S.tab==='instrucoes')bindInstrList();}
function footerHTML(){if(isWeekend||S.tab!=='hoje')return '';var rOk=ROTINA.filter(function(t){return S.ck[t.id];}).length,tOk=dayData.tasks.filter(function(t){return S.ck[t.id];}).length;if(rOk===ROTINA.length&&tOk===dayData.tasks.length){return '<div class="footer"><div style="font-size:22px;margin-bottom:6px">🌿</div><div class="footer-txt">Obrigada por cuidar com carinho da nossa casa.</div><div class="footer-txt">Bom descanso e até amanhã!</div></div>';}return '';}
function todayContent(){if(isWeekend){return '<div class="wd-screen"><div class="wd-title">Fim de semana</div><div class="wd-msg">Descanse bem! 🌿</div><div class="wd-sub">Use o menu abaixo para ver a semana ou a faxina.</div></div>';}var rOk=ROTINA.filter(function(t){return S.ck[t.id];}).length,tOk=dayData.tasks.filter(function(t){return S.ck[t.id];}).length,allDone=rOk===ROTINA.length&&tOk===dayData.tasks.length,out='';if(allDone)out+='<div class="all-done">Tudo concluído! Ótimo trabalho hoje ✓</div>';out+=cardapioHTML();if(dayData.warns&&dayData.warns.length){var warnRows=dayData.warns.map(function(w){var icon=w.charAt(0),txt=w.slice(w.indexOf(' ')+1);return '<div class="warn"><div class="warn-icon">'+icon+'</div><div class="warn-txt">'+txt+'</div></div>';}).join('');out+='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#FFFBEB"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="#C4973A" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="7" x2="8" y2="10" stroke="#C4973A" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.75" fill="#C4973A"/></svg></div><span class="sec-lbl">Avisos de hoje</span></div>'+warnRows+'</div>';}var rRows=ROTINA.map(function(t){var ok=!!S.ck[t.id];return '<div class="task" id="tk_'+t.id+'"><div class="chk'+(ok?' done':'')+'">'+( ok?chkSVG():'')+'</div><span class="tlbl'+(ok?' done':'')+'">'+t.tx+'</span></div>';}).join('');out+='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#EEF7F3"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#2D4A3E" stroke-width="1.5"/><polyline points="5,8.5 7,10.5 11,6" stroke="#2D4A3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sec-lbl">Rotina diária</span><span class="badge'+(rOk===ROTINA.length?' ok':'')+'">'+rOk+'/'+ROTINA.length+'</span></div>'+rRows+'</div>';if(dayData.tasks.length){var tRows=buildTarefasRows();out+='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#EEF2FF"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" stroke="#5B6BD5" stroke-width="1.5"/><line x1="6" y1="6" x2="10" y2="6" stroke="#5B6BD5" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="9" x2="10" y2="9" stroke="#5B6BD5" stroke-width="1.5" stroke-linecap="round"/></svg></div><span class="sec-lbl">Tarefas de hoje</span><span class="badge'+(tOk===dayData.tasks.length?' ok':'')+'">'+tOk+'/'+dayData.tasks.length+'</span></div>'+tRows+'</div>';}return out;}
function buildTarefasRows(){var rows='';dayData.tasks.forEach(function(t){var ok=!!S.ck[t.id],isD=(t.destaque===true),cls=isD?'task-destaque':'task';rows+='<div class="'+cls+'" id="tk_'+t.id+'"><div class="chk'+(ok?' done':'')+'">'+( ok?chkSVG():'')+'</div><span class="tlbl'+(ok?' done':'')+'">'+t.tx+'</span>'+(t.instr?'<button class="how" id="hi_'+t.instr+'">Como fazer</button>':'')+'</div>';});if(dow===4&&deveAparecerAC()){var acD=marcouAC();rows+='<div class="task-destaque" id="tk_ac"><div class="chk'+(acD?' done':'')+'">'+( acD?chkSVG():'')+'</div><span class="tlbl'+(acD?' done':'')+'">❄️ Limpar o ar-condicionado (quinzenal)</span></div>';}return rows;}
function bindToday(){ROTINA.forEach(function(t){bind('tk_'+t.id,function(){S.ck[t.id]=!S.ck[t.id];save('ck_'+dateKey,S.ck);draw();});});dayData.tasks.forEach(function(t){bind('tk_'+t.id,function(){S.ck[t.id]=!S.ck[t.id];save('ck_'+dateKey,S.ck);draw();});if(t.instr)bind('hi_'+t.instr,function(){S.instrKey=t.instr;S.view='instr';draw();},true);});if(dow===4&&deveAparecerAC()){bind('tk_ac',function(){toggleAC();draw();});}}
function semanaContent(){var out='',weekDays=[1,2,3,4,5],dayNames=['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira'],dayColors=['#5B8FCC','#CC8B5B','#5BAB7A','#CC5B8B','#5B8FCC'];weekDays.forEach(function(d,idx){var data=DIA[d],isToday=(!isWeekend&&d===dow),rotinaRows=ROTINA.slice(0,3).map(function(t){return '<div class="day-task-row"><div class="day-dot-sm"></div>'+t.tx+'</div>';}).join(''),moreRotina='<div class="day-task-row" style="color:#A8A49E;font-style:italic"><div class="day-dot-sm"></div>+ '+(ROTINA.length-3)+' tarefas de rotina</div>',warnRows=data.warns.map(function(w){return '<div class="day-warn"><span>'+w.charAt(0)+'</span><span style="margin-left:4px">'+w.slice(w.indexOf(' ')+1)+'</span></div>';}).join(''),taskRows=data.tasks.map(function(t){var isD=(t.destaque===true),style=isD?'color:#92700A;font-weight:600;background:#FFFBEB;':'';return '<div class="day-task-row" style="'+style+'"><div class="day-dot-sm" style="background:'+(isD?'#C4973A':dayColors[idx])+'"></div>'+t.tx+'</div>';}).join(''),acRow=d===4&&deveAparecerAC()?'<div class="day-task-row" style="color:#1A6B9A;font-weight:500;background:#EEF6FF"><div class="day-dot-sm" style="background:#1A6B9A"></div>❄️ Limpar o ar-condicionado (quinzenal)</div>':'',cd=S.cardapio&&S.cardapio.dias?S.cardapio.dias[String(d)]:null,cdRow=cd&&cd.proteina?'<div class="day-task-row" style="color:#2D4A3E;font-weight:500"><div class="day-dot-sm" style="background:#2D4A3E"></div>🍽️ '+cd.proteina.n+(cd.acompanhamento?' + '+cd.acompanhamento.n:'')+'</div>':'';out+='<div class="day-card"><div class="day-header"><div class="day-dot" style="background:'+dayColors[idx]+'"></div><div class="day-name">'+dayNames[idx]+'</div>'+(isToday?'<div class="day-today">hoje</div>':'')+'</div>'+warnRows+rotinaRows+moreRotina+taskRows+acRow+cdRow+'</div>';});return out;}
function faxinaContent(){var fd=S.weekNum?FAXINA[S.weekNum-1]:null,fTotal=fd?fd.itens.length:0,fOk=fd?fd.itens.filter(function(_,i){return S.fx['i'+i];}).length:0,out='';if(fd){var fRows=fd.itens.map(function(item,i){var ok=!!S.fx['i'+i];return '<div class="task" id="fx_i'+i+'"><div class="chk'+(ok?' done':'')+'">'+( ok?chkSVG():'')+'</div><span class="tlbl'+(ok?' done':'')+'">'+item+'</span></div>';}).join(''),fDone=fOk===fTotal&&fTotal>0?'<div style="padding:12px 16px;background:#EEF7F3;border-top:0.5px solid #D4EDE2;text-align:center;font-size:15px;font-weight:500;color:#2E7A4F">Faxina da semana concluída ✓</div>':'';out+='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#FFF5EE"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 14V7l5-5 5 5v7" stroke="#C4763A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="5" rx="0.5" stroke="#C4763A" stroke-width="1.5"/></svg></div><span class="sec-lbl">Faxina — '+fd.titulo+'</span><span class="badge'+(fOk===fTotal?' ok':'')+'">'+fOk+'/'+fTotal+'</span></div><div class="fax-note">Semana '+S.weekNum+' de 11 · Faça quando sobrar tempo</div>'+fRows+fDone+'</div>';}out+='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#F2EFE9"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 0 12 0A6 6 0 0 0 2 8z" stroke="#8A8580" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="#8A8580" stroke-width="1.5" stroke-linecap="round"/></svg></div><span class="sec-lbl">Ciclo completo — 11 semanas</span></div><div class="ciclo-wrap">'+FAXINA.map(function(f,i){var now=S.weekNum&&i===S.weekNum-1;return '<div class="ciclo-item'+(now?' now':'')+'"><span style="font-size:13px;font-weight:700;color:'+(now?'#2D4A3E':'#C8C3BA')+';width:22px;flex-shrink:0">'+(i+1)+'</span><span style="font-size:15px;color:'+(now?'#2D4A3E':'#8A8580')+';font-weight:'+(now?600:400)+'">'+f.titulo+'</span>'+(now?'<span style="margin-left:auto;font-size:11px;font-weight:600;color:#2D4A3E;background:#C8E8D4;padding:2px 8px;border-radius:10px">agora</span>':'')+'</div>';}).join('')+'</div></div>';return out;}
function bindFaxina(){var fd=S.weekNum?FAXINA[S.weekNum-1]:null;if(fd)fd.itens.forEach(function(_,i){bind('fx_i'+i,function(){S.fx['i'+i]=!S.fx['i'+i];save('fx_'+mondayKey,S.fx);draw();});});}
function instrContent(){return '<div class="sec">'+Object.keys(INSTR).map(function(k){return '<div class="irow" id="gi_'+k+'"><span style="flex:1;font-size:17px;color:#1E1E1E">'+INSTR[k].titulo+'</span><span style="color:#C8C3BA;font-size:20px">›</span></div>';}).join('')+'</div>';}
function bindInstrList(){Object.keys(INSTR).forEach(function(k){bind('gi_'+k,function(){S.instrKey=k;S.view='instr';draw();});});}
function drawSetup(app){var btns=FAXINA.map(function(f,i){return '<button id="wk'+(i+1)+'" class="wk'+(S.setupWk===i+1?' sel':'')+'"><div class="wk-n">Sem. '+(i+1)+'</div><div class="wk-s">'+f.titulo+'</div></button>';}).join('');app.innerHTML='<div class="setup-wrap"><div class="setup-top"><div class="setup-eyebrow">Casa Carol & Pedro</div><div class="setup-title">Configuração inicial</div></div><div class="setup-card"><h2>Ciclo de faxina</h2><p>Em qual semana do ciclo de 11 estamos agora?</p><div class="g3">'+btns+'</div><button id="btnConfirm" class="confirm-btn">Confirmar</button></div></div>';FAXINA.forEach(function(_,i){bind('wk'+(i+1),function(){S.setupWk=i+1;draw();});});bind('btnConfirm',function(){var d=new Date(mondayKey);d.setDate(d.getDate()-(S.setupWk-1)*7);S.refDate=d.toISOString().slice(0,10);calcWeek();save('fax_ref',S.refDate);S.view='main';draw();});}
function drawInstr(app){var d=INSTR[S.instrKey],steps=d.passos.map(function(p,i){return '<div class="step"><div class="snum">'+(i+1)+'</div><span style="font-size:16px;color:#1E1E1E;line-height:1.6">'+p+'</span></div>';}).join('');app.innerHTML='<div class="instr-wrap"><div class="instr-hero"><button id="btnBack" class="instr-back">← Voltar</button><div class="instr-title">'+d.titulo+'</div></div><div class="steps-card">'+steps+'</div></div>';bind('btnBack',function(){S.view='main';S.instrKey=null;draw();});}
var ck=load('ck_'+dateKey);if(ck)S.ck=ck;
var fx=load('fx_'+mondayKey);if(fx)S.fx=fx;
var ref=load('fax_ref');if(ref){S.refDate=ref;calcWeek();S.view='main';}else{S.view='setup';}
draw();
loadCardapio();
</script>
