<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Carol & Pedro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2EFE9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hero{background:#2D4A3E;padding:1.75rem 1.5rem 1.25rem;color:#fff}
.hero-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#6AA88E;font-weight:500;margin-bottom:10px}
.hero-name{font-size:32px;font-weight:400;color:#F0EDE8;letter-spacing:-0.5px;line-height:1.1}
.hero-date{font-size:13px;color:#7AAE94;margin-top:8px}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.hp{display:inline-flex;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(255,255,255,0.09);color:#7AAE94}
.hp.ok{background:rgba(139,184,164,0.22);color:#A8D4BC}
.hero-btns{display:flex;gap:8px;margin-top:14px}
.hbtn{padding:6px 13px;border-radius:7px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#A8D4BC;cursor:pointer;font-size:12px;font-family:inherit}
.body{padding:1rem 1.25rem 1.5rem}
.sec{margin-bottom:1rem;background:#fff;border-radius:14px;border:0.5px solid #E8E3DA;overflow:hidden}
.sec-header{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:0.5px solid #F2EFE9}
.sec-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-lbl{flex:1;font-size:14px;font-weight:500;color:#1E1E1E}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#F2EFE9;color:#9A958E}
.badge.ok{background:#E4F2EA;color:#2E7A4F}
.task{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:0.5px solid #F8F5F1;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.task:last-child{border-bottom:none}
.task:active{background:#FAFAF8}
.chk{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:1.5px solid #D8D2C8;background:#fff;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:all .15s}
.chk.done{background:#2D4A3E;border-color:#2D4A3E}
.tlbl{flex:1;font-size:15px;color:#1E1E1E;line-height:1.35;pointer-events:none}
.tlbl.done{color:#B8B3AA;text-decoration:line-through}
.how{padding:4px 10px;border-radius:7px;border:0.5px solid #E0DAD2;background:#F8F5F1;font-size:11px;color:#8A8580;cursor:pointer;font-family:inherit;flex-shrink:0;font-weight:500}
.all-done{margin:0 0 1rem;padding:15px;border-radius:14px;background:#E4F2EA;text-align:center;font-size:14px;font-weight:500;color:#2E7A4F;border:0.5px solid #C8E4D4}
.fax-note{padding:8px 15px;font-size:12px;color:#A8A49E;background:#FDFCFB;border-bottom:0.5px solid #F2EFE9}
.ciclo-wrap{padding:8px 15px 12px}
.ciclo-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;margin-bottom:3px}
.ciclo-item.now{background:#EEF7F3}
.irow{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:0.5px solid #F8F5F1;cursor:pointer}
.irow:last-child{border-bottom:none}
.footer{padding:20px 1.5rem;background:#2D4A3E;text-align:center}
.footer-txt{font-size:14px;color:#8BBB9E;line-height:1.7}
.setup-wrap{background:#2D4A3E;min-height:100vh;padding:1.5rem}
.setup-top{text-align:center;margin-bottom:1.5rem}
.setup-eyebrow{font-size:10px;letter-spacing:3px;color:#6AA88E;text-transform:uppercase;margin-bottom:6px}
.setup-title{font-size:22px;color:#F0EDE8;font-weight:500}
.setup-card{background:#fff;border-radius:16px;padding:1.5rem;max-width:460px;margin:0 auto}
.setup-card h2{font-size:16px;font-weight:500;color:#1E1E1E;margin-bottom:4px}
.setup-card p{font-size:13px;color:#8A8580;margin-bottom:1.25rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.wk{padding:11px 6px;border-radius:10px;cursor:pointer;text-align:center;border:1.5px solid #E8E3DA;background:#FAFAF8;font-family:inherit;width:100%}
.wk.sel{border-color:#2D4A3E;background:#EEF7F3}
.wk-n{font-size:13px;font-weight:600;color:#1E1E1E}
.wk-s{font-size:9px;color:#A8A49E;margin-top:2px;line-height:1.3}
.wk.sel .wk-n{color:#2D4A3E}
.confirm-btn{width:100%;padding:13px;border-radius:10px;border:none;background:#2D4A3E;color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.instr-wrap{background:#F2EFE9;min-height:100vh}
.instr-hero{background:#2D4A3E;padding:1.25rem 1.5rem 1.5rem}
.instr-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#A8D4BC;cursor:pointer;font-size:13px;font-family:inherit;margin-bottom:14px}
.instr-title{font-size:20px;font-weight:500;color:#F0EDE8}
.steps-card{background:#fff;border-radius:14px;margin:1rem 1.25rem;border:0.5px solid #E8E3DA;overflow:hidden}
.step{display:flex;gap:13px;padding:14px 15px;border-bottom:0.5px solid #F2EFE9}
.step:last-child{border-bottom:none}
.snum{width:26px;height:26px;border-radius:9px;flex-shrink:0;background:#EEF7F3;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2D4A3E}
.wd-screen{background:#2D4A3E;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.wd-title{font-size:10px;letter-spacing:3px;color:#6AA88E;text-transform:uppercase;margin-bottom:12px}
.wd-msg{font-size:22px;color:#F0EDE8;font-weight:400;margin-bottom:8px}
.wd-sub{font-size:14px;color:#7AAE94}
</style>
</head>
<body>
<div id="app"></div>
<script>
var ROTINA=[{id:"r1",tx:"Abrir janelas da sala para ventilar as plantas"},{id:"r2",tx:"Lavar a louça"},{id:"r3",tx:"Preparar fruta do Pedro"},{id:"r4",tx:"Tirar sapatos do hall, limpar e guardar"},{id:"r5",tx:"Retirar o lixo (se cheio ou com cheiro)"},{id:"r6",tx:"Arrumar a cama"},{id:"r7",tx:"Preparar o jantar e colocar a mesa"},{id:"r8",tx:"Varrer e passar o mop no chão"},{id:"r9",tx:"Verificar se tem entrega na portaria"},{id:"r10",tx:"Fechar as janelas no final do dia"}];
var DIA={1:[{id:"m1",tx:"Lavar roupas de academia",instr:"academia"},{id:"m2",tx:"Fazer comida"}],2:[{id:"t1",tx:"Regar as plantas"},{id:"t2",tx:"Lavar roupas normais",instr:"roupas"},{id:"t3",tx:"Fazer comida"},{id:"t4",tx:"Baleia na creche"}],3:[{id:"w1",tx:"Lavar o lençol",instr:"lencol"},{id:"w2",tx:"Trocar o lençol (Pedro e Carol)"},{id:"w3",tx:"Fazer comida"},{id:"w4",tx:"Baleia na creche"}],4:[{id:"h1",tx:"Lavar roupas de academia",instr:"academia"},{id:"h2",tx:"Passar as roupas"},{id:"h3",tx:"Limpar área da Baleia"},{id:"h4",tx:"Fazer comida"},{id:"h5",tx:"Baleia na creche"}],5:[{id:"f1",tx:"Regar as plantas"},{id:"f2",tx:"Lavar os banheiros"},{id:"f3",tx:"Trocar e lavar toalhas e tapetes",instr:"toalhas"},{id:"f4",tx:"Fazer comida"}]};
var FAXINA=[{titulo:"Área da cozinha",itens:["Limpeza da geladeira (por dentro e por fora)","Armários e gavetas da cozinha"]},{titulo:"Eletrodomésticos",itens:["Microondas e forno","Adega e cervejeira"]},{titulo:"Área de serviço",itens:["Armários da área de serviço","Máquina de lavar (limpeza interna)"]},{titulo:"Sala de estar",itens:["Tirar poeira dos livros e prateleiras","Passar aspirador no sofá"]},{titulo:"Banheiros e corredor",itens:["Armários internos dos banheiros","Armário do corredor"]},{titulo:"Quarto 1 - armários",itens:["Limpar e organizar os armários do quarto 1"]},{titulo:"Quarto 2 - armários",itens:["Limpar e organizar os armários do quarto 2"]},{titulo:"Quarto 3 - armário",itens:["Limpar e organizar o armário do quarto 3"]},{titulo:"Escritório",itens:["Prateleiras de livros do escritório","Limpar o carrinho"]}];
var INSTR={academia:{titulo:"Roupas de academia",passos:["Lavar separado das roupas do dia a dia.","Usar o modo TECIDO SINTÉTICO na máquina.","Pinho Sol no lugar do sabão + 1 tampa de Lysoform.","Nunca usar amaciante — vinagre branco no lugar.","Cada cor num saquinho. Meias e cuecas separadas.","Nunca passar — espirrar o cheirinho e guardar."]},roupas:{titulo:"Roupas normais",passos:["Separar por cores: brancas, pretas e coloridas.","Poucas peças: pode juntar pretas e coloridas em saquinhos diferentes.","Usar o modo MIX na máquina.","Verificar manchas e aplicar detergente direto antes de lavar.","Roupas brancas: Vanish de vez em quando (molho).","Vestidos e peças delicadas — Carol lava na mão.","Sempre espirrar cheirinho ao passar ou guardar."]},lencol:{titulo:"Lençol",passos:["Lavar o lençol separado de outras roupas.","Usar o modo ALGODÃO na máquina.","Sabão normal — bicarbonato se tiver cheiro forte.","Sem amaciante — meio copo de vinagre branco no lugar.","Secar bem na máquina com a função de secagem."]},toalhas:{titulo:"Toalhas e tapetes de banheiro",passos:["Lavar separado das roupas.","Pode misturar cores, mas usar saquinho nas coloridas.","Usar o modo ALGODÃO na máquina.","Sabão normal — 1 colher de bicarbonato se tiver cheiro.","Sem amaciante — meio copo de vinagre branco no lugar.","Secar bem na máquina com a função de secagem.","Espirrar cheirinho e guardar no armário do corredor."]}};
var DIAS=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
var MESES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
var today=new Date(),dow=today.getDay(),isWeekend=(dow===0||dow===6),dateKey=today.toISOString().slice(0,10);
function getMon(d){var t=new Date(d),dy=t.getDay();t.setDate(t.getDate()-dy+(dy===0?-6:1));return t.toISOString().slice(0,10);}
var mondayKey=getMon(today),dayTasks=(!isWeekend&&DIA[dow])||[];
var S={view:'loading',ck:{},fx:{},refDate:null,weekNum:null,setupWk:1,showCiclo:false,instrKey:null};
function calcWeek(){if(!S.refDate){S.weekNum=null;return;}var diff=Math.floor((new Date(mondayKey)-new Date(S.refDate))/(7*24*3600*1000));S.weekNum=((diff%9)+9)%9+1;}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function chkSVG(){return '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="2,7 5,10 11,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function bind(id,fn,stop){var el=document.getElementById(id);if(!el)return;el.addEventListener('click',function(e){if(stop)e.stopPropagation();fn(e);});}
function draw(){var app=document.getElementById('app');if(!app)return;if(S.view==='loading'){app.innerHTML='<div style="background:#2D4A3E;min-height:100vh;display:flex;align-items:center;justify-content:center"><span style="color:#6AA88E;font-size:14px">Carregando…</span></div>';return;}if(S.view==='setup'){drawSetup(app);return;}if(S.view==='instr'){drawInstr(app);return;}drawMain(app);}
function drawSetup(app){var btns=FAXINA.map(function(f,i){return '<button id="wk'+(i+1)+'" class="wk'+(S.setupWk===i+1?' sel':'')+'"><div class="wk-n">Sem. '+(i+1)+'</div><div class="wk-s">'+f.titulo+'</div></button>';}).join('');app.innerHTML='<div class="setup-wrap"><div class="setup-top"><div class="setup-eyebrow">Casa Carol & Pedro</div><div class="setup-title">Configuração inicial</div></div><div class="setup-card"><h2>Ciclo de faxina</h2><p>Em qual semana do ciclo de 9 estamos agora?</p><div class="g3">'+btns+'</div><button id="btnConfirm" class="confirm-btn">Confirmar</button></div></div>';FAXINA.forEach(function(_,i){bind('wk'+(i+1),function(){S.setupWk=i+1;draw();});});bind('btnConfirm',function(){var d=new Date(mondayKey);d.setDate(d.getDate()-(S.setupWk-1)*7);S.refDate=d.toISOString().slice(0,10);calcWeek();save('fax_ref',S.refDate);S.view='main';draw();});}
function drawInstr(app){var d=INSTR[S.instrKey];var steps=d.passos.map(function(p,i){return '<div class="step"><div class="snum">'+(i+1)+'</div><span style="font-size:14px;color:#1E1E1E;line-height:1.6">'+p+'</span></div>';}).join('');app.innerHTML='<div class="instr-wrap"><div class="instr-hero"><button id="btnBack" class="instr-back">← Voltar</button><div class="instr-title">'+d.titulo+'</div></div><div class="steps-card">'+steps+'</div></div>';bind('btnBack',function(){S.view='main';S.instrKey=null;draw();});}
function drawMain(app){if(isWeekend){app.innerHTML='<div class="wd-screen"><div class="wd-title">Casa Carol & Pedro</div><div class="wd-msg">Bom fim de semana!</div><div class="wd-sub">Descanse — até segunda-feira. 🌿</div></div>';return;}
var rOk=ROTINA.filter(function(t){return S.ck[t.id];}).length,tOk=dayTasks.filter(function(t){return S.ck[t.id];}).length,fd=S.weekNum?FAXINA[S.weekNum-1]:null,fTotal=fd?fd.itens.length:0,fOk=fd?fd.itens.filter(function(_,i){return S.fx['i'+i];}).length:0,allDone=rOk===ROTINA.length&&tOk===dayTasks.length;
var hero='<div class="hero"><div class="hero-eyebrow">Casa Carol & Pedro</div><div class="hero-name">Bom dia!</div><div class="hero-date">'+DIAS[dow]+', '+today.getDate()+' de '+MESES[today.getMonth()]+'</div><div class="hero-pills"><span class="hp'+(rOk===ROTINA.length?' ok':'')+'">Rotina '+rOk+'/'+ROTINA.length+'</span>'+(dayTasks.length?'<span class="hp'+(tOk===dayTasks.length?' ok':'')+'">Tarefas '+tOk+'/'+dayTasks.length+'</span>':'')+(S.weekNum?'<span class="hp'+(fOk===fTotal&&fTotal>0?' ok':'')+'">Faxina sem. '+S.weekNum+'/9 — '+fOk+'/'+fTotal+'</span>':'')+'</div><div class="hero-btns"><button id="btnCfg" class="hbtn">⚙ Config</button></div></div>';
function mkTask(id,tx,done,ik){return '<div class="task" id="'+id+'"><div class="chk'+(done?' done':'')+'">'+( done?chkSVG():'')+'</div><span class="tlbl'+(done?' done':'')+'">'+tx+'</span>'+(ik?'<button class="how" id="hi_'+ik+'">Como fazer</button>':'')+'</div>';}
var rRows=ROTINA.map(function(t){return mkTask('tk_'+t.id,t.tx,!!S.ck[t.id],null);}).join('');
var secR='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#EEF7F3"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#2D4A3E" stroke-width="1.5"/><polyline points="5,8.5 7,10.5 11,6" stroke="#2D4A3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sec-lbl">Rotina diária</span><span class="badge'+(rOk===ROTINA.length?' ok':'')+'">'+rOk+'/'+ROTINA.length+'</span></div>'+rRows+'</div>';
var secT='';if(dayTasks.length){var tRows=dayTasks.map(function(t){return mkTask('tk_'+t.id,t.tx,!!S.ck[t.id],t.instr||null);}).join('');secT='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#EEF2FF"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" stroke="#5B6BD5" stroke-width="1.5"/><line x1="6" y1="6" x2="10" y2="6" stroke="#5B6BD5" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="9" x2="10" y2="9" stroke="#5B6BD5" stroke-width="1.5" stroke-linecap="round"/></svg></div><span class="sec-lbl">Tarefas de hoje</span><span class="badge'+(tOk===dayTasks.length?' ok':'')+'">'+tOk+'/'+dayTasks.length+'</span></div>'+tRows+'</div>';}
var secF='';if(fd){var fRows=fd.itens.map(function(item,i){return mkTask('fx_i'+i,item,!!S.fx['i'+i],null);}).join('');var fDone=fOk===fTotal&&fTotal>0?'<div style="padding:11px 15px;background:#EEF7F3;border-top:0.5px solid #D4EDE2;text-align:center;font-size:13px;font-weight:500;color:#2E7A4F">Faxina da semana concluída ✓</div>':'';var ciclo='';if(S.showCiclo){ciclo='<div class="ciclo-wrap">'+FAXINA.map(function(f,i){var now=i===S.weekNum-1;return '<div class="ciclo-item'+(now?' now':'')+'"><span style="font-size:11px;font-weight:700;color:'+(now?'#2D4A3E':'#C8C3BA')+';width:20px;flex-shrink:0">'+(i+1)+'</span><span style="font-size:13px;color:'+(now?'#2D4A3E':'#8A8580')+';font-weight:'+(now?600:400)+'">'+f.titulo+'</span>'+(now?'<span style="margin-left:auto;font-size:10px;font-weight:600;color:#2D4A3E;background:#C8E8D4;padding:2px 8px;border-radius:10px">agora</span>':'')+'</div>';}).join('')+'</div>';}secF='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#FFF5EE"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 14V7l5-5 5 5v7" stroke="#C4763A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="5" rx="0.5" stroke="#C4763A" stroke-width="1.5"/></svg></div><span class="sec-lbl">Faxina — '+fd.titulo+'</span><span class="badge'+(fOk===fTotal?' ok':'')+'">'+fOk+'/'+fTotal+'</span></div><div class="fax-note">Semana '+S.weekNum+' de 9 · Faça quando sobrar tempo</div>'+fRows+fDone+'<div style="padding:10px 15px;border-top:0.5px solid #F2EFE9"><button id="btnCiclo" style="font-size:12px;color:#9A958E;background:none;border:none;cursor:pointer;font-family:inherit;padding:0">'+(S.showCiclo?'▲ Ocultar ciclo':'▼ Ver ciclo completo de 9 semanas')+'</button></div>'+ciclo+'</div>';}
var instrKeys=Object.keys(INSTR),iRows=instrKeys.map(function(k){return '<div class="irow" id="gi_'+k+'"><span style="flex:1;font-size:14px;color:#1E1E1E">'+INSTR[k].titulo+'</span><span style="color:#C8C3BA;font-size:18px">›</span></div>';}).join('');
var secI='<div class="sec"><div class="sec-header"><div class="sec-icon" style="background:#FDF0F5"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 0 0-2 7.46V11h4V9.46A4 4 0 0 0 8 2z" stroke="#B84A7E" stroke-width="1.5" stroke-linejoin="round"/><line x1="6" y1="13" x2="10" y2="13" stroke="#B84A7E" stroke-width="1.5" stroke-linecap="round"/></svg></div><span class="sec-lbl">Instruções de lavagem</span></div>'+iRows+'</div>';
var footer='<div class="footer"><div style="font-size:20px;margin-bottom:6px">🌿</div><div class="footer-txt">Obrigada por cuidar com carinho da nossa casa.</div><div class="footer-txt">Bom descanso e até amanhã!</div></div>';
app.innerHTML='<div>'+hero+'<div class="body">'+(allDone?'<div class="all-done">Tudo concluído! Ótimo trabalho hoje ✓</div>':'')+secR+secT+secF+secI+'</div>'+footer+'</div>';
bind('btnCfg',function(){S.view='setup';draw();});bind('btnCiclo',function(){S.showCiclo=!S.showCiclo;draw();});
ROTINA.forEach(function(t){bind('tk_'+t.id,function(){S.ck[t.id]=!S.ck[t.id];save('ck_'+dateKey,S.ck);draw();});});
dayTasks.forEach(function(t){bind('tk_'+t.id,function(){S.ck[t.id]=!S.ck[t.id];save('ck_'+dateKey,S.ck);draw();});if(t.instr)bind('hi_'+t.instr,function(){S.instrKey=t.instr;S.view='instr';draw();},true);});
if(fd)fd.itens.forEach(function(_,i){bind('fx_i'+i,function(){S.fx['i'+i]=!S.fx['i'+i];save('fx_'+mondayKey,S.fx);draw();});});
instrKeys.forEach(function(k){bind('gi_'+k,function(){S.instrKey=k;S.view='instr';draw();});});}
var ck=load('ck_'+dateKey);if(ck)S.ck=ck;
var fx=load('fx_'+mondayKey);if(fx)S.fx=fx;
var ref=load('fax_ref');if(ref){S.refDate=ref;calcWeek();S.view='main';}else{S.view='setup';}
draw();
</script>
</body>
  </html>
